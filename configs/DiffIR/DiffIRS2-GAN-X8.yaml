# ==============================================================================
# 🌟 (Global Settings)
# ==============================================================================
globals:
  scale: 8
  lq_patch_size: 48

# ==============================================================================
# Global & Trainer Configuration
# ==============================================================================
trainer:
  max_epochs: 300
  accelerator: "gpu"
  devices: [0]               # Use list for specific GPUs, e.g., [0, 1]
  precision: "bf16-mixed"      # FP16 mixed precision for faster training
  log_every_n_steps: 10
  check_val_every_n_epoch: 3


# ==============================================================================
# DataModule Configuration (SRDataModule)
# ==============================================================================
data:
  # Path configs (Replace with your actual dataset paths)
  train_img_dir: "/data/RiceSR2024/RGB-SAR/dataset/train/LR_bicubic"
  train_gt_dir: "/data/RiceSR2024/RGB-SAR/dataset/train/GT"
  val_img_dir: "/data/RiceSR2024/RGB-SAR/dataset/val/LR_bicubic"
  val_gt_dir: "/data/RiceSR2024/RGB-SAR/dataset/val/GT"
  test_img_dir: "/data/RiceSR2024/RGB-SAR/dataset/test/LR_bicubic"   # Optional
  test_gt_dir: "/data/RiceSR2024/RGB-SAR/dataset/test/GT"    # Optional
  
  # DataLoader configs
  batch_size: 16
  num_workers: 8
  
  # Image transformation configs
  lq_patch_size: ${globals.lq_patch_size}   # The size to crop from Low-Res image
  scale: ${globals.scale}                   # Upsampling factor. HR patch will be 32 * 4 = 128


# ==============================================================================
# Ema decay
# ==============================================================================
ema_decay: 0.999

# ==============================================================================
# LightningModule Configuration (SRDiffusionModule)
# ==============================================================================
lightning_module:
  target: DiffIRGANS2LightningModule
  
  params:
    network_config_s1:
      target: DiffIRS1
      params:
        n_encoder_res: 9
        inp_channels: 3
        out_channels: 3
        scale: ${globals.scale}
        dim: 64
        num_blocks: [13,1,1,1]
        num_refinement_blocks: 13
        heads: [1,2,4,8]
        ffn_expansion_factor: 2.2
        bias: False
        LayerNorm_type: BiasFree
    
    network_config_g:
      target: DiffIRS2
      params:
        n_encoder_res: 9
        inp_channels: 3
        out_channels: 3
        scale: ${globals.scale}
        dim: 64
        num_blocks: [13,1,1,1]
        num_refinement_blocks: 13
        heads: [1,2,4,8]
        ffn_expansion_factor: 2.2
        bias: False
        LayerNorm_type: BiasFree
        n_denoise_res: 1
        linear_start: 0.1
        linear_end: 0.99
        timesteps: 4

    network_config_d:
      target: UNetDiscriminatorSN
      params:
        num_in_ch: 3
        num_feat: 64
        skip_connection: True

    train_config:
      losses:
        pixel_opt:
          type: L1Loss
          loss_weight: 1.0
          reduction: mean

        # perceptual_opt:
        #   type: PerceptualLoss
        #   layer_weights:
        #     # before relu
        #     'conv1_2': 0.1
        #     'conv2_2': 0.1
        #     'conv3_4': 1
        #     'conv4_4': 1
        #     'conv5_4': 1
        #   vgg_type: vgg19
        #   use_input_norm: true
        #   perceptual_weight: !!float 1.0
        #   style_weight: 0
        #   range_norm: false
        #   criterion: l1

        # gan loss
        gan_opt:
          type: GANLoss
          gan_type: vanilla
          real_label_val: 1.0
          fake_label_val: 0.0
          loss_weight: !!float 1.0

        kd_opt:
          type: KDLoss
          loss_weight: 1
          temperature: 0.15

      net_d_iters: 1
      net_d_init_iters: 0


      lr_scheduler_config:
        type: "MultiStepLR"
        milestones: [150]
        gamma: 0.5

      optim_g:
        lr: 2.0e-4
        weight_decay: 0.0
        betas: [0.9, 0.99]

      optim_d:
        lr: 1.0e-4
        weight_decay: 0.0
        betas: [0.9, 0.99]

      
    eval_crop_border: ${globals.scale}

    pretrain_s1_path: logs/DiffIR/S1/DiffIR-x8/version_0/best-epoch=029-val/psnr=25.1744.ckpt
    pretrain_s2_path: logs/DiffIR/S2/DiffIR-x8/version_0/best-epoch=023-val/psnr=25.1381.ckpt



# ==============================================================================
# Image Logger
# ==============================================================================
image_logger:
  log_batch_freq: 1
  max_images: 8