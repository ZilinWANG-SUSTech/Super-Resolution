# ==============================================================================
# Global & Trainer Configuration
# ==============================================================================
trainer:
  max_epochs: 500
  accelerator: "gpu"
  devices: [0]               # Use list for specific GPUs, e.g., [0, 1]
  precision: "bf16-mixed"      # FP16 mixed precision for faster training
  log_every_n_steps: 10
  check_val_every_n_epoch: 5 # Run validation every 5 epochs
  module_type: "diffusion"

# ==============================================================================
# DataModule Configuration (SRDataModule)
# ==============================================================================
data:
  # Path configs (Replace with your actual dataset paths)
  train_img_dir: "/data/RiceSR2024/SAR/dataset/train/LR_bicubic/X4"
  train_gt_dir: "/data/RiceSR2024/SAR/dataset/train/GT"
  val_img_dir: "/data/RiceSR2024/SAR/dataset/val/LR_bicubic/X4"
  val_gt_dir: "/data/RiceSR2024/SAR/dataset/val/GT"
  test_img_dir: "/data/RiceSR2024/SAR/dataset/test/LR_bicubic/X4"   # Optional
  test_gt_dir: "/data/RiceSR2024/SAR/dataset/test/GT"    # Optional
  
  # DataLoader configs
  batch_size: 16
  num_workers: 8
  
  # Image transformation configs
  lq_patch_size: 32          # The size to crop from Low-Res image
  scale: 4                   # Upsampling factor. HR patch will be 32 * 4 = 128

# ==============================================================================
# LightningModule Configuration (SRDiffusionModule)
# ==============================================================================
model:
  learning_rate: 1.0e-4
  eval_crop_border: 4        # Same as scale factor to ignore boundaries during evaluation

  # ----------------------------------------------------------------------------
  # Diffusion Scheduler (DDPMScheduler)
  # ----------------------------------------------------------------------------
  scheduler_config:
    num_train_timesteps: 1000
    beta_schedule: "linear"
    prediction_type: "epsilon"

  # ----------------------------------------------------------------------------
  # Denoising Network (Dynamically instantiated via instantiate_from_config)
  # ----------------------------------------------------------------------------
  network_config:
    target: "diffusers.UNet2DModel"
    params:
      sample_size: null      # Accept any image size
      in_channels: 6         # 3 (Noisy HR) + 3 (Upsampled LR condition)
      out_channels: 3        # Predict noise for the 3 HR channels
      layers_per_block: 2
      block_out_channels: 
        - 64
        - 128
        - 256
        - 512
      down_block_types:
        - "DownBlock2D"
        - "DownBlock2D"
        - "AttnDownBlock2D"
        - "DownBlock2D"
      up_block_types:
        - "UpBlock2D"
        - "AttnUpBlock2D"
        - "UpBlock2D"
        - "UpBlock2D"