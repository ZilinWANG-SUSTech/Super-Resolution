# ==============================================================================
# 🌟 (Global Settings)
# ==============================================================================
globals:
  scale: 16
  lq_patch_size: 24

# ==============================================================================
# Global & Trainer Configuration
# ==============================================================================
trainer:
  max_epochs: 300
  accelerator: "gpu"
  devices: [0]               # Use list for specific GPUs, e.g., [0, 1]
  precision: "bf16-mixed"      # FP16 mixed precision for faster training
  log_every_n_steps: 10
  check_val_every_n_epoch: 30
  accumulate_grad_batches: 8
  num_sanity_val_steps: 0


# ==============================================================================
# DataModule Configuration (SRDataModule)
# ==============================================================================
data:
  # Path configs (Replace with your actual dataset paths)
  train_img_dir: "/data/RiceSR2024/RGB-SAR/dataset/train/LR_bicubic"
  train_gt_dir: "/data/RiceSR2024/RGB-SAR/dataset/train/GT"
  val_img_dir: "/data/RiceSR2024/RGB-SAR/dataset/val/LR_bicubic"
  val_gt_dir: "/data/RiceSR2024/RGB-SAR/dataset/val/GT"
  test_img_dir: "/data/RiceSR2024/RGB-SAR/dataset/test/LR_bicubic"   # Optional
  test_gt_dir: "/data/RiceSR2024/RGB-SAR/dataset/test/GT"    # Optional
  
  # DataLoader configs
  batch_size: 2
  num_workers: 8
  
  # Image transformation configs
  lq_patch_size: ${globals.lq_patch_size}   # The size to crop from Low-Res image
  scale: ${globals.scale}                   # Upsampling factor. HR patch will be 32 * 4 = 128

  image_range: "0~1"

# ==============================================================================
# Ema decay
# ==============================================================================
ema_decay: 0.995


# ==============================================================================
# LightningModule Configuration (SRDiffusionModule)
# ==============================================================================
lightning_module:
  target: IRSDEEngine
  params:
    eval_crop_border: ${globals.scale}        # Same as scale factor to ignore boundaries during evaluation
    scale_factor: ${globals.scale}
    
    optimizer_config:
      type: AdamW
      lr: 4e-5
      weight_decay: 0.0
      betas: [0.9, 0.99]

    # ----------------------------------------------------------------------------
    # Learning Rate Scheduler
    # ----------------------------------------------------------------------------
    lr_scheduler_config:
      type: TrueCosineAnnealingLR
      T_max: ${trainer.max_epochs}
      eta_min: 1e-7

    loss_config:
      loss_type: l1
      is_weighted: False
      weight: 1.0

    sde_config:
      max_sigma: 50
      T: 100
      schedule: cosine # linear, cosine
      eps: 0.005

    # ----------------------------------------------------------------------------
    # Network
    # ----------------------------------------------------------------------------
    network_config:
      target: ConditionalNAFNet
      params:
        img_channel: 3
        width: 64
        enc_blk_nums: [14, 1, 1, 1]
        middle_blk_num: 1
        dec_blk_nums: [1, 1, 1, 1]


# ==============================================================================
# Image Logger
# ==============================================================================
image_logger:
  log_batch_freq: 1
  max_images: 8
